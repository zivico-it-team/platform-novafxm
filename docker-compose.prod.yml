services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-trading_platform}
      MYSQL_USER: ${DB_USER:-novafxm}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3002
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN}
      DB_HOST: mysql
      DB_USER: ${DB_USER:-novafxm}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      DB_NAME: ${DB_NAME:-trading_platform}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
    ports:
      - "3002:3002"

  frontend:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"

volumes:
  mysql_data:
